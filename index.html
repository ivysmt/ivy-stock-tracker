function kdSignal(k,d){
  if(k===null||k===undefined)return {cls:'kd-gray',txt:'資料待填\n—'};
  const K=parseFloat(k),D2=d!==null&&d!==undefined?parseFloat(d):null;
  const kv='K='+K.toFixed(0)+(D2!==null?' D='+D2.toFixed(0):'');
  if(K<20){
    if(D2!==null&&K<D2)return {cls:'kd-red',txt:kv+'\n✕ 超賣死叉'};
    return {cls:'kd-red',txt:kv+'\n超賣區'};
  }
  if(K<35){
    if(D2!==null&&K>D2)return {cls:'kd-green',txt:kv+'\n低位黃金交叉'};
    return {cls:'kd-yellow',txt:kv+'\n低位反彈中'};
  }
  if(K<55){
    if(D2!==null&&K<D2)return {cls:'kd-red',txt:kv+'\n✕ 死叉整理'};
    if(D2!==null&&K>D2)return {cls:'kd-yellow',txt:kv+'\nK值中段\nMACD轉正觀察'};
    return {cls:'kd-yellow',txt:kv+'\nK值中段'};
  }
  if(K<75){
    if(D2!==null&&K>D2)return {cls:'kd-green',txt:kv+'\n✓ 黃金交叉·偏多'};
    if(D2!==null&&K<D2)return {cls:'kd-red',txt:kv+'\n✕ 死叉MACD翻負'};
    return {cls:'kd-yellow',txt:kv+'\nKD中段向上·偏多'};
  }
  if(K<=85){
    if(D2!==null&&K>D2)return {cls:'kd-green',txt:kv+'\n✓ 黃金交叉·高位'};
    return {cls:'kd-yellow',txt:kv+'\nKD高位\n強勢不追'};
  }
  if(D2!==null&&K>D2)return {cls:'kd-yellow',txt:kv+'\n黃金交叉·高位\n注意股'};
  return {cls:'kd-red',txt:kv+'\n⚠ 超買高位\n注意回調'};
}

function fitTag(f){
  if(f==='最適合')return '<span class="fit-best">最適合</span>';
  if(f==='適合')return '<span class="fit-good">適合</span>';
  if(f==='中性觀察')return '<span class="fit-mid">中性觀察</span>';
  if(f==='勿追')return '<span class="fit-no">勿追</span>';
  return '<span class="fit-out">已出場</span>';
}

function load(){
  try{
    const raw=localStorage.getItem(LSKEY);
    if(raw)stocks=JSON.parse(raw);
    else{stocks=DEFAULT;save(false);}
  }catch(e){stocks=DEFAULT;}
  fillSectors();render();updateStats();
}

function save(t=true){
  try{
    localStorage.setItem(LSKEY,JSON.stringify(stocks));
    document.getElementById('last-update').textContent='資料更新：'+new Date().toLocaleDateString('zh-TW');
    if(t)toast('已儲存');
  }catch(e){toast('儲存失敗');}
}

function forceSync(){save(true);}

function clearAll(){
  if(!confirm('確定清除所有資料並還原預設？此操作無法復原！'))return;
  localStorage.removeItem(LSKEY);
  stocks=DEFAULT;save(false);render();toast('已還原預設資料');
}

function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function fillSectors(){
  const s=document.getElementById('fi');
  const all=[...new Set(stocks.map(x=>x.sector).filter(Boolean))].sort();
  s.innerHTML='<option value="">全部產業</option>';
  all.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});
}

function updateStats(){
  const t=stocks.length;
  document.getElementById('s-total').textContent=t;
  document.getElementById('b-total').textContent=t+' 檔';
  document.getElementById('s-best').textContent=stocks.filter(x=>x.fit==='最適合').length;
  document.getElementById('s-good').textContent=stocks.filter(x=>x.fit==='適合').length;
  document.getElementById('s-mid').textContent=stocks.filter(x=>x.fit==='中性觀察').length;
  document.getElementById('s-out').textContent=stocks.filter(x=>x.fit==='已出場').length;
}

function sb(k){if(sk===k)sd*=-1;else{sk=k;sd=1;}render();}

function fmt(v,d=1){return v===null||v===undefined?'—':typeof v==='number'?v.toFixed(d):v;}
function fmtP(v){return v===null||v===undefined?'—':Number(v).toLocaleString();}

function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const ff=document.getElementById('ff').value;
  const fi=document.getElementById('fi').value;
  let list=stocks.filter(s=>{
    if(q&&!(s.code||'').toLowerCase().includes(q)&&!(s.name||'').toLowerCase().includes(q))return false;
    if(ff&&s.fit!==ff)return false;
    if(fi&&s.sector!==fi)return false;
    return true;
  });
  if(sk)list.sort((a,b)=>{
    const FO={'最適合':1,'適合':2,'中性觀察':3,'勿追':4,'已出場':5};
    let av=sk==='fit'?(FO[a[sk]]||9):a[sk];
    let bv=sk==='fit'?(FO[b[sk]]||9):b[sk];
    if(av==null)av=sd>0?Infinity:-Infinity;
    if(bv==null)bv=sd>0?Infinity:-Infinity;
    return av>bv?sd:av<bv?-sd:0;
  });
  const tb=document.getElementById('tb');
  if(!list.length){
    tb.innerHTML='<tr><td colspan="13" style="text-align:center;padding:2rem;color:#9ca3af">沒有符合條件的股票</td></tr>';
    updateStats();return;
  }
  tb.innerHTML=list.map(s=>{
    const i=stocks.indexOf(s);
    const sig=kdSignal(s.kd_k,s.kd_d);
    const peH=s.pe?'<span class="'+(s.pe>50?'peh':'')+'">'+(+s.pe).toFixed(1)+'</span>':'—';
    const moatS=(s.moat||'').length>30?(s.moat||'').slice(0,28)+'…':s.moat||'—';
    return '<tr>'+
      '<td style="font-weight:600">'+s.code+'</td>'+
      '<td title="'+(s.note||'')+'">'+s.name+'</td>'+
      '<td style="color:#6b7280;font-size:11px">'+( s.sector||'—')+'</td>'+
      '<td>'+fmtP(s.price)+'</td>'+
      '<td>'+peH+'</td>'+
      '<td>'+fmt(s.eps,2)+'</td>'+
      '<td>'+fmt(s.roe,1)+'</td>'+
      '<td>'+fmt(s.gm,1)+'</td>'+
      '<td style="font-size:11px;color:#6b7280" title="'+(s.moat||'')+'">'+moatS+'</td>'+
      '<td><span class="'+sig.cls+'">'+sig.txt+'</span></td>'+
      '<td style="font-size:11px;color:#6b7280">'+(s.buyzone||'—')+'</td>'+
      '<td>'+fitTag(s.fit)+'</td>'+
      '<td><div style="display:flex;gap:3px">'+
        '<button class="ab" onclick="openEdit('+i+')" title="編輯">&#x270E;</button>'+
        '<button class="ab" onclick="del('+i+')" title="刪除" style="color:#dc2626">&#x2715;</button>'+
      '</div></td>'+
    '</tr>';
  }).join('');
  updateStats();
}

function openAdd(){
  eidx=null;
  document.getElementById('mt').textContent='新增股票';
  ['fc','fn','fsc2','fp','fpe','fe','fr','fg2','fk','fd','fmw','fbz','fnt'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('ffit').value='中性觀察';
  document.getElementById('overlay').style.display='flex';
}

function openEdit(i){
  eidx=i;const s=stocks[i];
  document.getElementById('mt').textContent='編輯 '+s.name;
  document.getElementById('fc').value=s.code||'';
  document.getElementById('fn').value=s.name||'';
  document.getElementById('fsc2').value=s.sector||'';
  document.getElementById('fp').value=s.price||'';
  document.getElementById('fpe').value=s.pe||'';
  document.getElementById('fe').value=s.eps||'';
  document.getElementById('fr').value=s.roe||'';
  document.getElementById('fg2').value=s.gm||'';
  document.getElementById('fk').value=s.kd_k!=null?s.kd_k:'';
  document.getElementById('fd').value=s.kd_d!=null?s.kd_d:'';
  document.getElementById('fmw').value=s.moat||'';
  document.getElementById('fbz').value=s.buyzone||'';
  document.getElementById('ffit').value=s.fit||'中性觀察';
  document.getElementById('fnt').value=s.note||'';
  document.getElementById('overlay').style.display='flex';
}

function bgClose(e){if(e.target===document.getElementById('overlay'))closeM();}
function closeM(){document.getElementById('overlay').style.display='none';}

function saveS(){
  const code=document.getElementById('fc').value.trim();
  const name=document.getElementById('fn').value.trim();
  if(!code||!name){toast('代號和名稱為必填');return;}
  const n=v=>{const x=parseFloat(v);return isNaN(x)?null:x;};
  const obj={code,name,
    sector:document.getElementById('fsc2').value.trim(),
    price:n(document.getElementById('fp').value),
    pe:n(document.getElementById('fpe').value),
    eps:n(document.getElementById('fe').value),
    roe:n(document.getElementById('fr').value),
    gm:n(document.getElementById('fg2').value),
    kd_k:n(document.getElementById('fk').value),
    kd_d:n(document.getElementById('fd').value),
    moat:document.getElementById('fmw').value.trim(),
    buyzone:document.getElementById('fbz').value.trim(),
    fit:document.getElementById('ffit').value,
    note:document.getElementById('fnt').value.trim(),
  };
  if(eidx!==null)stocks[eidx]=obj;else stocks.push(obj);
  closeM();fillSectors();render();save();
}

function del(i){
  if(!confirm('確定刪除 '+stocks[i].code+' '+stocks[i].name+'？'))return;
  stocks.splice(i,1);render();save();
}

function exportCSV(){
  const h=['代號','名稱','產業','現價','本益比','EPS','ROE%','毛利%','護城河','K值','D值','買點區間','適合度','備註'];
  const rows=stocks.map(s=>[s.code,s.name,s.sector,s.price,s.pe,s.eps,s.roe,s.gm,s.moat,s.kd_k,s.kd_d,s.buyzone,s.fit,s.note].map(v=>v==null?'':String(v).replace(/,/g,'，')).join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='ivy_stocks_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
